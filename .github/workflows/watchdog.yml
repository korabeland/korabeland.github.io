# Scheduled watchdog: scans korabeland's public GitHub repos for new,
# includable projects (see scripts/scan-repos.ts) and opens one PR per
# newly-detected repo proposing a project card.
#
# Cadence: every Monday at 09:00 UTC (start-of-week check-in). Also
# runnable on demand via workflow_dispatch for manual/dry-run testing.
#
# IMPORTANT: PR titles MUST exactly match `Add project card: {slug}`.
# scripts/scan-repos.ts dedups against already-open watchdog PRs by
# checking for this exact title prefix (PR_TITLE_PREFIX) via `gh pr list`.
# Any drift here silently breaks that dedup and causes repeat proposals.

name: Watchdog — scan for new projects

"on":
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Two workflow_dispatch runs in quick succession would otherwise both see
# the same "not yet proposed" state and could open duplicate PRs for the
# same repo before either run's PR lands. One run at a time; queue rather
# than cancel, since a scan run should always be allowed to finish cleanly.
concurrency:
  group: watchdog
  cancel-in-progress: false

jobs:
  scan-and-propose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run watchdog scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/scan-repos.ts

      - name: Check for new project cards
        id: check
        run: |
          if [ -z "$(git status --porcelain src/content/projects/)" ]; then
            echo "No new project cards — nothing to propose this run."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open one PR per new project card
        if: steps.check.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          base_branch="${GITHUB_REF_NAME}"
          failures_file="$(mktemp)"

          # NOTE: this `while` runs as the last stage of a pipe, so bash runs
          # it in a subshell — a plain shell variable set inside the loop
          # (e.g. a failure counter) would be lost the moment the loop ends.
          # `failures_file` sidesteps that by tracking state on disk instead.
          git status --porcelain src/content/projects/ | cut -c4- | while IFS= read -r file; do
            slug=$(basename "$file" .md)
            branch="watchdog/${slug}"

            echo "Proposing card for slug: ${slug}"

            git checkout -q -b "$branch" "$base_branch"
            git add "$file"
            git commit -q -m "Add project card: ${slug}"
            git push -q -u origin "$branch"

            body_file="$(mktemp)"
            cat > "$body_file" <<EOF
          Watchdog detected a new public repo and drafted a project card for it: \`${slug}\`.

          **What happens when you close this PR matters — read before you act.**

          - **Merge as-is** → the card goes live immediately on the next deploy (\`deploy.yml\` runs on every push to \`main\`). The \`hook\` field currently holds the GitHub repo description as a placeholder — consider rewriting it in your voice before merging, though it's not required for the merge to work.
          - **Edit \`status: live\` to \`status: skipped\`, then merge** → records a permanent skip. The file stays committed under \`src/content/projects/\` as a denylist entry (per R13), so this repo will never be re-proposed on a future run, regardless of its \`status\` value.
          - **Close this PR without merging** → there is no committed record of the rejection, so this repo will likely be re-proposed the next time the watchdog runs.

          This PR was opened automatically by \`.github/workflows/watchdog.yml\` via \`scripts/scan-repos.ts\`.
          EOF

            # A push already landed the branch (and its card) on origin
            # before this point — gh pr create needs the remote branch to
            # exist to open a PR against it, so this ordering is required.
            # If it fails here, the pushed branch would otherwise sit
            # unmerged forever: the next run's dedup only checks main
            # (readExistingSlugs) and open PRs (readOpenWatchdogPrSlugs), so
            # neither sees an orphaned branch with no PR — the next attempt
            # for this slug would then hit a non-fast-forward push rejection
            # against the leftover branch and fail every time after. Clean
            # up on failure so the slug can be proposed again next run, and
            # keep processing the remaining slugs in this run instead of
            # aborting the whole batch over one bad one.
            if gh pr create \
              --base "$base_branch" \
              --head "$branch" \
              --title "Add project card: ${slug}" \
              --body-file "$body_file"; then
              rm -f "$body_file"
            else
              echo "::error::gh pr create failed for ${slug} — deleting the orphaned branch so it can be retried next run"
              git push -q --delete origin "$branch" || true
              rm -f "$body_file"
              git checkout -q "$base_branch"
              echo "$slug" >> "$failures_file"
              continue
            fi

            git checkout -q "$base_branch"
          done

          if [ -s "$failures_file" ]; then
            echo "::error::Failed to propose card(s) for: $(paste -sd, "$failures_file")"
            rm -f "$failures_file"
            exit 1
          fi
          rm -f "$failures_file"
